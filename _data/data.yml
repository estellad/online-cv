employment:
    - role: Doctoral Researcher
      time: 09.2022 - Present
      company: CHUV - Biomedical Data Science Center, Lausanne
      details: |
        • Integrating scRNAseq and spatial transcriptomics (ST) to decode breast, lung, DLBCL cancer.<br>
        • Leveraging deep learning-extracted imaging features to inform gene expression analysis.<br>
        • Developing pipeline for various ST technologies, such as GeoMx, Visium, VisiumHD & Xenium.<br>

    - role: Computational Scientist
      time: 01.2022 - 08.2022
      company: Bayer - Oncology Digitalization & Computational Science, Mississauga
      details: |
        • Led first R for submission at Bayer with pharmaverse admiral, managing scope of 2 sub-teams.<br> 
        • Designed templates that streamlined AE reporting in CSR; drafted developer's guidelines. <br>
        • Assist open-source initiatives in the department and industry-wide working groups. <br>
        
    - role: Research Professional
      time: 01.2021 - 12.2021
      company: Analysis Group - Department of Healthcare, Montreal
      details: |
        • Used IPTW to create external control cohorts for a Phase II oncology trial. <br>
        • Predicted the remission of rare diseases with random survival forest. <br>
        • Developed R pipelines to automate chart review quality reports, improved efficiency. <br>
        • Analyzed autoimmune disorder characteristics using IBM Optum NLP data. <br>

    - role: Biostatistics and Data Sciences Intern
      time: 05.2019 - 12.2020
      company: Roche - Biostatistics and US Medical Affairs, Mississauga
      details: |
        • Built Shiny module to explore AE and efficacy of a Phase I FDA breakthrough molecule. <br>
        • Audited Phase II/III trial meetings, interim analysis, and reviewed study protocol and SAP.<br> 
        • Developed R functions for disease biology analysis of RNA-seq data from 8 NHL trials. <br>
        • Created network analysis animation to identify real-world drug use patterns.<br>

    - role: Machine Learning Algorithm Developer
      time: 05.2017 - 05.2018
      company: BC Cancer Research Center - Integrative Oncology Imaging Unit, Vancouver
      details: |
        • Pre-processed H&E and Feulgen images in MATLAB; tuned CNNs in Python. <br>
        • Trained Random Forest classifiers in R on imbalanced oral cell data to assist pathologists.<br>
        • Delivered bi-monthly presentations on deep learning applications in pathology.<br>
  
