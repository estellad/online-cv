{% assign scholars = site.data.data.visiting-scholar %}
{% if experiences %}
<section class="section experiences-section">
  <h2 class="section-title">
    <span class="fa-stack fa-xs">
      <i class="fas fa-circle fa-stack-2x"></i>
      <i class="fas fa-magnifying-glass-chart fa-stack-1x fa-inverse"></i>
    </span>
    <b> Visiting Scholar </b>
  </h2>

  {% for scholar in scholars %}
  <div class="item">

    <div class="meta">

      <div class="upper-row">
        <h3 class="job-title"><b>{{ scholar.role }}</b></h3> 
        <div class="time">{{ scholar.time }}</div>
      </div><!--//upper-row-->

      <div class="company">{{ scholar.company }}</div>

    </div><!--//meta-->

    {% if scholar.details %}
    <div class="details">
      {{ scholar.details | markdownify }}
    </div><!--//details-->
    {% endif %}

  </div><!--//item-->
  {% endfor %}

</section><!--//section-->
{% endif %}
